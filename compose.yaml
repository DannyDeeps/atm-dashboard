services:
  app:
    build: .
    ports:
      - "80:80"
    environment:
      - SERVER_NAME=:80
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=atm_dashboard
      - DB_USER=postgres
      - DB_PASSWORD=letmein
      - MC_SERVER_ADDR=127.0.0.1
      - MC_SERVER_PORT=25569
      - MC_SERVER_HOSTNAME=atm10.example.com
      - WEBMAP_URL=/bluemap/
    volumes:
      - heads-cache:/app/public/images/heads
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=atm_dashboard
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=letmein
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
  heads-cache:
