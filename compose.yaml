services:
  app:
    build: .
    ports:
      - "80:80"
    environment:
      - SERVER_NAME=:80
      - DB_HOST=192.168.0.10
      - DB_PORT=5432
      - DB_NAME=atm_dashboard
      - DB_USER=postgres
      - DB_PASSWORD=letmein
      - MC_SERVER_ADDR=127.0.0.1
      - MC_SERVER_PORT=25569
      - MC_SERVER_HOSTNAME=atm10.example.com
      - WEBMAP_URL=/bluemap/
    volumes:
      - heads-cache:/app/public/images/heads
    restart: unless-stopped

volumes:
  heads-cache:
